version: "3.9"

services:

  postgres:
    image: ankane/pgvector
    container_name: shrutabodha-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: shrutadb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shrutabodha-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  localstack:
    image: localstack/localstack
    container_name: shrutabodha-localstack
    environment:
      - SERVICES=s3
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  ollama:
    image: ollama/ollama
    container_name: shrutabodha-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  localstack_data:
  ollama_data:
