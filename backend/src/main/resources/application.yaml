spring:
  servlet:
    multipart:
      max-file-size: 750MB
      max-request-size: 750MB
  datasource:
    url: jdbc:postgresql://localhost:5432/shrutadb
    username: appuser
    password: apppass
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  main:
    allow-bean-definition-overriding: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
